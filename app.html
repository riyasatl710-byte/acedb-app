<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ACEDB - Agricultural Contract Employee DataBase Management System">
  <title>ACEDB - Dashboard</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <img src="assets/logo.png" alt="ACEDB">
        <div class="sidebar-brand-text">
          <h3>ACEDB</h3>
          <small>Employee Database</small>
        </div>
      </div>

      <nav class="sidebar-nav" id="sidebarNav">
        <!-- Populated by Router.init() -->
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-user" onclick="Router.navigate('settings')">
          <div class="user-avatar" id="userAvatar">SA</div>
          <div class="user-info">
            <h4 id="userName">Super Admin</h4>
            <small id="userRole">SuperAdmin</small>
          </div>
        </div>
        <button class="btn btn-ghost btn-sm btn-full" style="margin-top:8px;color:rgba(255,255,255,0.6)" onclick="handleLogout()">
          <i class="bi bi-box-arrow-left"></i> <span data-i18n="logout">Logout</span>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="top-header">
        <div class="header-left">
          <button class="menu-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
          <h2 id="pageTitle" data-i18n="dashboard">Dashboard</h2>
        </div>
        <div class="header-right">
          <div class="lang-switch">
            <button class="lang-btn active" data-lang="en" onclick="setLanguage('en')">EN</button>
            <button class="lang-btn" data-lang="ml" onclick="setLanguage('ml')">ML</button>
          </div>
          <button class="btn btn-ghost btn-icon" onclick="Router.navigate('notifications')" title="Notifications">
            <i class="bi bi-bell"></i>
          </button>
          <button class="btn btn-ghost btn-icon" onclick="window.print()" title="Print">
            <i class="bi bi-printer"></i>
          </button>
        </div>
      </header>

      <div class="page-content" id="pageContent">
        <div class="text-center" style="padding:60px">
          <div class="spinner" style="margin:0 auto 16px"></div>
          <p class="text-muted">Loading...</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal Container -->
  <div class="modal-backdrop" id="mainModal" onclick="if(event.target===this)hideModal('mainModal')"></div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div><div class="loading-text" data-i18n="loading">Loading...</div></div>

  <!-- Sidebar Overlay for Mobile -->
  <div id="sidebarOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99" onclick="toggleSidebar()"></div>

  <!-- Core Scripts -->
  <script src="js/config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/router.js"></script>

  <!-- Module Scripts -->
  <script src="js/dashboard.js"></script>
  <script src="js/employees.js"></script>
  <script src="js/salary.js"></script>
  <script src="js/leave.js"></script>
  <script src="js/contracts.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/reports.js"></script>
  <script src="js/users.js"></script>
  <script src="js/settings.js"></script>

  <script>
    // Auth check
    if (!requireAuth()) { /* redirects to login */ }
    else {
      // Set user info
      const user = getCurrentUser();
      document.getElementById('userName').textContent = user.fullName || user.userId;
      document.getElementById('userRole').textContent = user.role;
      document.getElementById('userAvatar').textContent = (user.fullName || user.userId).substring(0, 2).toUpperCase();
      document.title = 'ACEDB - ' + (user.fullName || 'Dashboard');

      // Initialize language
      setLanguage(localStorage.getItem(ACEDB_CONFIG.LANG_KEY) || 'en');

      // Initialize router (builds sidebar internally + starts routing)
      Router.init();
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      sidebar.classList.toggle('open');
      overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
    }
  </script>
</body>
</html>
