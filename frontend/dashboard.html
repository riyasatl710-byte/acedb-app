<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ACEDB Public Dashboard - View agricultural contract employee statistics by scheme and district.">
  <title>ACEDB - Public Dashboard</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="public-header">
    <div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:16px">
      <img src="assets/logo.png" alt="ACEDB" style="width:56px;height:56px;border-radius:12px">
      <div>
        <h1>ACEDB</h1>
        <p>Agricultural Contract Employee DataBase - Public Dashboard</p>
      </div>
    </div>
    <div style="display:flex;justify-content:center;gap:12px;margin-top:16px">
      <a href="index.html" class="btn btn-accent btn-sm"><i class="bi bi-box-arrow-in-right"></i> Login</a>
      <div class="lang-switch"><button class="lang-btn active" data-lang="en" onclick="setLanguage('en')">EN</button><button class="lang-btn" data-lang="ml" onclick="setLanguage('ml')">ML</button></div>
    </div>
  </div>

  <div class="public-body">
    <div id="publicStats" class="stats-grid animate-slide"></div>
    <div class="charts-grid animate-slide" style="animation-delay:0.2s">
      <div class="card"><div class="card-header"><h3><i class="bi bi-diagram-3"></i> Employees by Scheme</h3></div><div class="card-body"><div class="chart-container"><canvas id="pubSchemeChart"></canvas></div></div></div>
      <div class="card"><div class="card-header"><h3><i class="bi bi-geo-alt"></i> Employees by District</h3></div><div class="card-body"><div class="chart-container"><canvas id="pubDistChart"></canvas></div></div></div>
    </div>
    <div class="card animate-slide" style="animation-delay:0.4s">
      <div class="card-header"><h3><i class="bi bi-building"></i> District-wise Breakdown</h3></div>
      <div class="card-body" style="padding:0"><div class="table-wrapper">
        <table class="data-table" id="pubDistTable"><thead><tr><th>District</th><th>Employee Count</th><th>Percentage</th></tr></thead><tbody id="pubDistTableBody"></tbody></table>
      </div></div>
    </div>
  </div>

  <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div><div class="loading-text">Loading dashboard...</div></div>

  <script src="js/config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    setLanguage(localStorage.getItem(ACEDB_CONFIG.LANG_KEY) || 'en');

    (async function() {
      const result = await API.getPublicDashboard();
      if (!result.success) { showToast('Failed to load dashboard', 'error'); return; }
      const d = result.data;

      // Stats
      document.getElementById('publicStats').innerHTML = `
        <div class="stat-card purple"><div class="stat-icon purple"><i class="bi bi-people-fill"></i></div><div class="stat-value">${formatNumber(d.totalEmployees)}</div><div class="stat-label">${t('total_employees')}</div></div>
        <div class="stat-card amber"><div class="stat-icon amber"><i class="bi bi-diagram-3"></i></div><div class="stat-value">${Object.keys(d.byScheme).length}</div><div class="stat-label">Total Schemes</div></div>
        <div class="stat-card green"><div class="stat-icon green"><i class="bi bi-geo-alt"></i></div><div class="stat-value">${Object.keys(d.byDistrict).length}</div><div class="stat-label">Districts</div></div>
        <div class="stat-card red"><div class="stat-icon red"><i class="bi bi-person-slash"></i></div><div class="stat-value">${formatNumber(d.totalSuspended)}</div><div class="stat-label">${t('suspended')}</div></div>`;

      // Charts
      const colors = ['#7E57C2','#FFB300','#10B981','#EF4444','#6366F1','#EC4899','#14B8A6','#F97316','#8B5CF6','#06B6D4','#F43F5E','#22D3EE','#A855F7','#84CC16','#FB923C'];

      const schemeLabels = Object.keys(d.byScheme);
      new Chart(document.getElementById('pubSchemeChart'), {
        type: 'doughnut',
        data: { labels: schemeLabels, datasets: [{ data: Object.values(d.byScheme), backgroundColor: colors.slice(0, schemeLabels.length), borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
      });

      const distLabels = Object.keys(d.byDistrict);
      new Chart(document.getElementById('pubDistChart'), {
        type: 'bar',
        data: { labels: distLabels, datasets: [{ label: 'Employees', data: Object.values(d.byDistrict), backgroundColor: '#7E57C2cc', borderRadius: 6, borderColor: '#7E57C2', borderWidth: 1 }] },
        options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true } } }
      });

      // Table
      const tbody = document.getElementById('pubDistTableBody');
      const distEntries = Object.entries(d.byDistrict).sort((a,b) => b[1]-a[1]);
      tbody.innerHTML = distEntries.map(([dist, count]) =>
        `<tr><td>${dist}</td><td><strong>${formatNumber(count)}</strong></td><td>${d.totalEmployees > 0 ? ((count/d.totalEmployees)*100).toFixed(1) + '%' : '0%'}</td></tr>`
      ).join('');
    })();
  </script>
</body>
</html>
