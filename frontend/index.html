<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ACEDB - Agricultural Contract Employee DataBase. Login to access employee management, salary tracking, and administrative tools.">
  <title>ACEDB - Login</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo"><img src="assets/logo.png" alt="ACEDB Logo"></div>
      <h1 class="login-title">ACEDB</h1>
      <p class="login-subtitle">Agricultural Contract Employee DataBase</p>

      <form id="loginForm" onsubmit="handleLoginSubmit(event)">
        <div class="form-group">
          <label class="form-label" data-i18n="user_id">User ID</label>
          <div class="input-group">
            <i class="bi bi-person input-icon"></i>
            <input type="text" class="form-control" id="loginUserId" placeholder="Enter your User ID" required autocomplete="username">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="password">Password</label>
          <div class="input-group">
            <i class="bi bi-lock input-icon"></i>
            <input type="password" class="form-control" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password">
            <button type="button" class="toggle-password" onclick="togglePasswordVisibility()"><i class="bi bi-eye" id="pwdToggleIcon"></i></button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-full" style="margin-top:8px">
          <i class="bi bi-box-arrow-in-right"></i> <span data-i18n="sign_in">Sign In</span>
        </button>
      </form>

      <div style="text-align:center;margin-top:24px">
        <div class="lang-switch" style="display:inline-flex">
          <button class="lang-btn active" data-lang="en" onclick="setLanguage('en')">English</button>
          <button class="lang-btn" data-lang="ml" onclick="setLanguage('ml')">മലയാളം</button>
        </div>
      </div>

      <div style="text-align:center;margin-top:20px">
        <a href="dashboard.html" style="color:var(--primary);font-size:13px;text-decoration:none">
          <i class="bi bi-bar-chart"></i> View Public Dashboard
        </a>
      </div>
    </div>
  </div>

  <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div><div class="loading-text">Signing in...</div></div>

  <script src="js/config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Redirect if already logged in
    if (isLoggedIn()) window.location.href = 'app.html';
    setLanguage(localStorage.getItem(ACEDB_CONFIG.LANG_KEY) || 'en');

    function togglePasswordVisibility() {
      const pwd = document.getElementById('loginPassword');
      const icon = document.getElementById('pwdToggleIcon');
      if (pwd.type === 'password') { pwd.type = 'text'; icon.className = 'bi bi-eye-slash'; }
      else { pwd.type = 'password'; icon.className = 'bi bi-eye'; }
    }
  </script>
</body>
</html>
